<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAK Ceramics Fujairah</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body {background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color:white; height:100vh; display:flex; flex-direction:column;}
.header {text-align:center;padding:20px;font-size:2rem;font-weight:bold;}
.tv-toggle, .sound-toggle {
    position: fixed; top:20px; z-index:100; width:50px; height:50px; border-radius:8px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; box-shadow:0 0 10px rgba(0,0,0,0.5);
    background:#00c6ff; border:none; font-size:24px;
}
.tv-toggle {right:80px;}
.sound-toggle {right:20px;}
.container {flex:1; display:flex; padding:10px;}
.player {flex:1; border-radius:12px; overflow:hidden; box-shadow:0 0 15px rgba(0,0,0,0.5);}
#player {width:100%; height:100%;}
.footer {text-align:center; padding:10px; font-size:0.9rem; opacity:0.7;}
</style>
</head>
<body>

<div class="header">Welcome to RAK Ceramics Fujairah Branch</div>

<button class="tv-toggle" onclick="toggleFullscreen()" title="Toggle Fullscreen">🖥️</button>
<button class="sound-toggle" onclick="toggleSound()" title="Click to unmute/mute">🔇</button>

<div class="container">
    <div class="player" id="player"></div>
</div>
<div class="footer">© RAK 2026</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;
let isMuted = true;

// RAK Ceramics channel uploads playlist ID
const uploadsPlaylist = "UUvDakUnoH4q5pQpDNDDENUQ"; // 'UU'+ChannelID

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height:'100%',
        width:'100%',
        playerVars:{
            listType:'playlist',
            list:uploadsPlaylist,
            autoplay:1,
            loop:1,
            controls:0,
            rel:0,
            modestbranding:1,
            mute:1 // start muted
        },
        events:{
            'onReady': (e)=>e.target.playVideo(),
            'onStateChange': onPlayerStateChange,
            'onError': onPlayerError
        }
    });
}

function onPlayerStateChange(event){
    if(event.data === YT.PlayerState.ENDED){
        player.nextVideo();
    }
}

function onPlayerError(event){
    console.warn('Video blocked or error, skipping:', event.data);
    player.nextVideo();
}

function toggleFullscreen(){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

function toggleSound(){
    const btn = document.querySelector('.sound-toggle');
    if(isMuted){
        player.unMute();
        isMuted = false;
        btn.style.background = '#00ff7f';
        btn.textContent = '🔊'; // sound on
    } else {
        player.mute();
        isMuted = true;
        btn.style.background = '#00c6ff';
        btn.textContent = '🔇'; // sound off
    }
}
</script>

</body>
</html>
