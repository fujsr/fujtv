<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAK Ceramics Fujairah</title>
<style>
* {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
body {background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; height: 100vh; display: flex; flex-direction: column;}
.header {text-align: center; padding: 20px; font-size: 2rem; font-weight: bold;}
.tv-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    width: 50px; height: 50px; background: #00c6ff; border-radius: 8px; cursor: pointer;
    border: none; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.tv-toggle::before {
    content: '';
    display: block;
    width: 24px; height: 18px; border: 3px solid black; border-radius: 2px; position: relative;
}
.tv-toggle::after {
    content: '';
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    width: 8px; height: 4px; background: black; border-radius: 1px;
}
.container {flex: 1; display: flex; padding: 10px;}
.player {flex: 1; border-radius: 12px; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5);}
#player {width: 100%; height: 100%;}
.footer {text-align: center; padding: 10px; font-size: 0.9rem; opacity: 0.7;}
</style>
</head>
<body>

<div class="header">Welcome to RAK Ceramics Fujairah Branch</div>
<button class="tv-toggle" onclick="toggleFullscreen()"></button>
<div class="container">
    <div class="player" id="player">
        <!-- YouTube iframe will be injected here -->
    </div>
</div>
<div class="footer">© Hesper 2026</div>

<script>
function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

// Channel Uploads Playlist ID
const uploadsPlaylist = "UUVDakUnoH4q5pQpDNDDENUQ";

// Embed YouTube Iframe
const iframe = document.createElement("iframe");
iframe.width = "100%";
iframe.height = "100%";
iframe.src = `https://www.youtube.com/embed/videoseries?list=${uploadsPlaylist}&autoplay=1&loop=1&controls=0&rel=0&modestbranding=1`;
iframe.frameBorder = "0";
iframe.allow = "autoplay; fullscreen";
iframe.allowFullscreen = true;

document.getElementById("player").appendChild(iframe);
</script>

</body>
</html>
