<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAK Ceramics Fujairah</title>
<style>
* {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
body {background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; height: 100vh; display: flex; flex-direction: column;}
.header {text-align: center; padding: 20px; font-size: 2rem; font-weight: bold;}
.tv-toggle {position: fixed; top: 20px; right: 20px; z-index: 100; background: #00c6ff; color: black; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;}
.container {flex: 1; display: flex; padding: 10px;}
.player {flex: 1; border-radius: 12px; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5);}
#player {width: 100%; height: 100%;}
.footer {text-align: center; padding: 10px; font-size: 0.9rem; opacity: 0.7;}
</style>
</head>
<body>

<div class="header">Welcome to RAK Ceramics Fujairah Branch</div>
<button class="tv-toggle" onclick="toggleFullscreen()">TV Mode</button>
<div class="container">
    <div class="player">
        <div id="player"></div>
    </div>
</div>
<div class="footer">© Hesper</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;
let currentVideo = 0;

// List of individual video IDs from RAK Ceramics channel (replace/add any new videos)
const videos = [
    "9DflRTvoXh8",
    "uCnJDtD0_WA"
];

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: videos[currentVideo],
        playerVars: {
            autoplay: 1,
            mute: 1,
            controls: 0,
            modestbranding: 1,
            rel: 0
        },
        events: {
            'onReady': (event) => event.target.playVideo(),
            'onStateChange': onPlayerStateChange,
            'onError': onPlayerError
        }
    });
}

function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        currentVideo = (currentVideo + 1) % videos.length;
        player.loadVideoById(videos[currentVideo]);
    }
}

function onPlayerError(event) {
    console.warn('Video blocked or error, skipping:', event.data);
    currentVideo = (currentVideo + 1) % videos.length;
    player.loadVideoById(videos[currentVideo]);
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}
</script>

</body>
</html>
