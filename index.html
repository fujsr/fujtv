<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAK Ceramics Fujairah</title>
<style>
* {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
body {background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; height: 100vh; display: flex; flex-direction: column;}
.header {text-align: center; padding: 20px; font-size: 2rem; font-weight: bold;}
.tv-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    width: 50px; height: 50px; background: #00c6ff; border-radius: 8px; cursor: pointer;
    border: none; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.tv-toggle::before {
    content: '';
    display: block;
    width: 24px; height: 18px; border: 3px solid black; border-radius: 2px; position: relative;
}
.tv-toggle::after {
    content: '';
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    width: 8px; height: 4px; background: black; border-radius: 1px;
}
.container {flex: 1; display: flex; padding: 10px;}
.player {flex: 1; border-radius: 12px; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5);}
#player {width: 100%; height: 100%;}
.footer {text-align: center; padding: 10px; font-size: 0.9rem; opacity: 0.7;}
</style>
</head>
<body>

<div class="header">Welcome to RAK Ceramics Fujairah Branch</div>
<button class="tv-toggle" onclick="toggleFullscreen()"></button>
<div class="container">
    <div class="player"><div id="player"></div></div>
</div>
<div class="footer">© Hesper 2026</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let player;
let videoIDs = [];
let currentVideo = 0;

// Replace with your YouTube API key
const API_KEY = "YOUR_YOUTUBE_API_KEY_HERE"; 

// RAK Ceramics channel ID
const CHANNEL_ID = "UCUxN5Zy-Nn3p5qRkD8zOQ-w"; // replace with actual if needed

// Fetch videos from the channel
async function fetchChannelVideos() {
    let url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=50`;
    try {
        const response = await fetch(url);
        const data = await response.json();
        videoIDs = data.items
            .filter(item => item.id.kind === "youtube#video")
            .map(item => item.id.videoId);
        if (videoIDs.length > 0) initPlayer();
        else console.error("No videos found");
    } catch(err) {
        console.error("Error fetching videos", err);
    }
}

// Initialize YouTube player
function initPlayer() {
    player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        videoId: videoIDs[currentVideo],
        playerVars: {
            autoplay: 1,
            controls: 0,
            modestbranding: 1,
            rel: 0
        },
        events: {
            'onReady': (event) => event.target.playVideo(),
            'onStateChange': onPlayerStateChange,
            'onError': onPlayerError
        }
    });
}

// Loop videos sequentially
function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        currentVideo = (currentVideo + 1) % videoIDs.length;
        player.loadVideoById(videoIDs[currentVideo]);
    }
}

// Skip blocked videos
function onPlayerError(event) {
    console.warn('Video blocked or error, skipping:', event.data);
    currentVideo = (currentVideo + 1) % videoIDs.length;
    player.loadVideoById(videoIDs[currentVideo]);
}

// TV fullscreen toggle
function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

// YouTube API callback
function onYouTubeIframeAPIReady() {
    fetchChannelVideos();
}
</script>

</body>
</html>
